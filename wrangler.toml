# Cloudflare Pages 配置
name = "image-background-remover"
compatibility_date = "2024-01-01"

# D1 数据库绑定
[[d1_databases]]
binding = "DB"
database_name = "bg-remover-db"
database_id = "auto-generated-on-create"  # 首次创建后会自动更新

# 环境变量
[vars]
ENVIRONMENT = "production"

# 生产环境配置
[env.production]
[[env.production.d1_databases]]
binding = "DB"
database_name = "bg-remover-prod"
database_id = "auto-generated-on-create"

# 预览环境配置
[env.preview]
[[env.preview.d1_databases]]
binding = "DB"
database_name = "bg-remover-preview"
database_id = "auto-generated-on-create"
